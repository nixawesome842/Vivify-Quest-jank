lname: Build Vivify QMod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: sudo apt-get update -q && sudo apt-get install -y powershell

      - name: Install CMake and Ninja
        run: sudo apt-get install -y cmake ninja-build

      - name: Install QPM
        run: |
          QPM_URL=$(curl -s https://api.github.com/repos/QuestPackageManager/QPM.CLI/releases/latest | grep browser_download_url | grep -i linux | grep -v musl | head -1 | cut -d '"' -f 4)
          wget -q $QPM_URL -O qpm_download
          if file qpm_download | grep -q Zip; then
            unzip -q qpm_download -d qpm_dir
            cp qpm_dir/qpm* ./qpm 2>/dev/null || cp qpm_dir/* ./qpm
          else
            cp qpm_download ./qpm
          fi
          chmod +x ./qpm
          sudo cp ./qpm /usr/local/bin/qpm
          qpm --version

      - name: Setup NDK
        run: qpm ndk resolve -d

      - name: QPM restore
        run: qpm restore

      - name: Fix file encoding
        run: find src include -type f | xargs sed -i s/$'\xef\xbb\xbf'//

      - name: Build
        run: |
          cmake -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo -B build
          cmake --build ./build
          cp build/libvivify.so build/libVivify.so 2>/dev/null || true

      - name: Create QMod
        run: pwsh ./scripts/createqmod.ps1

      - name: Upload QMod
        uses: actions/upload-artifact@v4
        with:
          name: Vivify
          path: '*.qmod'
          if-no-files-found: error
